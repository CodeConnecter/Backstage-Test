apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: unisys
  title: Unisys Migration Assistant Platform
  description: >-
    Enterprise platform for analyzing, assessing, and modernizing legacy Java applications.
    Combines static code analysis, AI-powered intelligence, and automated code transformation
    to deliver actionable migration strategies. Supports Maven, Gradle, and Ant builds with
    three-tier complexity classification (L1/L2/L3) and framework migration across EJB,
    JAX-RS, JSF to Spring Boot, Java 8→17→21 upgrades, and more.
  tags:
    - java
    - modernization
    - migration

  links:
    - url: https://github.com/CodeConnecter/Backstage-Test
      title: GitHub Repository
      icon: github
    - url: https://raw.githubusercontent.com/CodeConnecter/Backstage-Test/main/docs/ARCHITECTURE.md
      title: Architecture Documentation
      icon: documentation

spec:
  owner: group:default/team-transformation
  domain: group:default/platform-engineering

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: team-transformation
  title: Transformation Team
  description: >-
    Team responsible for platform development, AI integrations, and modernization tooling

spec:
  type: team
  profile:
    displayName: Transformation Team
    email: team-transformation@unisys.com
  parent: group:default/engineering
  children: []
  members:
    - user:default/architect-lead
    - user:default/backend-lead

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: assessment-service
  title: Assessment Service
  description: >-
    Core backend service for analyzing Java codebases and generating modernization assessment reports.
    Detects project structure, dependencies, and framework usage. Classifies complexity (L1/L2/L3),
    integrates with GenAI Service for AI-powered recommendations, and generates HTML/PDF reports
    via FreeMarker templates. Supports Maven, Gradle, and Ant build systems.
  annotations:
    github.com/project-slug: CodeConnecter/Backstage-Test
    backstage.io/techdocs-ref: dir:.
    sonarqube.org/project-key: unisys:assessment-service
    kubernetes.io/service-name: assessment-service
  tags:
    - spring-boot
    - code-analysis

  links:
    - url: https://raw.githubusercontent.com/CodeConnecter/Backstage-Test/main/docs/assessment-service.md
      title: Service Documentation
      icon: documentation
    - url: https://raw.githubusercontent.com/CodeConnecter/Backstage-Test/main/api/openapi.yaml
      title: OpenAPI Specification
      icon: docs

spec:
  type: service
  lifecycle: production
  owner: group:default/team-transformation
  system: unisys

  providesApis:
    - assessment-service-api

  dependsOn:
    - component:default/genai-service
    - component:default/template-config
    - resource:default/openai-api
    - resource:default/azure-openai-api
    - resource:default/auth0-oauth

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: assessment-service-api
  title: Assessment Service REST API
  description: >-
    Primary REST API for the Assessment Service.
    Provides endpoints for project analysis, report generation, and health checks.
    Requires JWT authentication. Accepts ZIP archives of Java projects and returns
    modernization assessment reports in HTML or PDF format.
  tags:
    - java
    - rest
  links:
    - url: https://raw.githubusercontent.com/CodeConnecter/Backstage-Test/main/api/openapi.yaml
      title: OpenAPI 3.0 Specification
      icon: docs

spec:
  type: openapi
  lifecycle: production
  owner: group:default/team-transformation
  system: unisys
  definition:
    $text: ./api/openapi.yaml
  consumedBy:
    - component:default/eclipse-plugin

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: user-api
  title: User Management API
  description: >-
    REST API for user authentication and authorization.
    Integrates with Auth0 for OAuth2/JWT token management.
    Manages user profiles, permissions, and role-based access control.

spec:
  type: openapi
  lifecycle: production
  owner: group:default/team-transformation
  system: unisys
  definition:
    $text: ./api/user-openapi.yaml
  consumedBy:
    - component:default/assessment-service
    - component:default/genai-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: genai-service
  title: GenAI Service
  description: >-
    AI integration layer providing unified abstraction over OpenAI and Azure OpenAI APIs
    for intelligent code analysis and migration recommendations. Manages assistant lifecycle,
    handles threaded conversations with file-aware context, processes code metadata,
    and supports provider switching. Implements Assistants API v2 and Azure OpenAI
    API v2024-05-01-preview with GPT-4o model.
  annotations:
    github.com/project-slug: CodeConnecter/Backstage-Test
    backstage.io/techdocs-ref: dir:.
    sonarqube.org/project-key: unisys:genai-service
  tags:
    - ai
    - microservice
  links:
    - url: https://raw.githubusercontent.com/CodeConnecter/Backstage-Test/main/docs/genai-service.md
      title: Service Documentation
      icon: documentation
    - url: https://raw.githubusercontent.com/CodeConnecter/Backstage-Test/main/api/genai-service-api.yaml
      title: API Specification
      icon: docs

spec:
  type: service
  lifecycle: production
  owner: group:default/team-transformation
  system: unisys

  providesApis:
    - genai-service-internal-api

  dependsOn:
    - resource:default/openai-api
    - resource:default/azure-openai-api

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: genai-service-internal-api
  title: GenAI Service Internal API
  description: >-
    Internal library API (JAR) for GenAI Service functionality.
    Provides configuration layer, service layer for assistant lifecycle,
    client layer for REST calls, and file management operations.
    Supports both OpenAI and Azure OpenAI providers with GPT-4o model.

spec:
  type: openapi
  lifecycle: production
  owner: group:default/team-transformation
  system: unisys
  definition:
    $text: ./api/genai-service-api.yaml
  providedBy:
    - component:default/genai-service
  consumedBy:
    - component:default/assessment-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: template-config
  title: Template Config Service
  description: >-
    Template configuration and code transformation service for automated framework migration
    and modernization. Loads YAML transformation configurations, parses source files into AST
    using JavaParser, transforms annotations/imports/types, updates build files (pom.xml)
    with new dependencies. Supports JAX-RS→Spring Boot, EJB modernization, and Java
    version upgrade migrations with OpenRewrite recipes.
  annotations:
    github.com/project-slug: CodeConnecter/Backstage-Test
    backstage.io/techdocs-ref: dir:.
    sonarqube.org/project-key: unisys:template-config
  tags:
    - code-transformation
    - openrewrite
    - framework
  links:
    - url: https://raw.githubusercontent.com/CodeConnecter/Backstage-Test/main/docs/template-config.md
      title: Service Documentation
      icon: documentation

spec:
  type: service
  lifecycle: production
  owner: group:default/team-transformation
  system: unisys

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: eclipse-plugin
  title: Eclipse IDE Plugin
  description: >-
    Client-side Eclipse IDE plugin providing interactive in-IDE assessment and migration
    capabilities. Integrates with Assessment Service for code analysis and report generation.
    Supports 28+ migration actions for automating framework transitions and Java upgrades.
    Built on Eclipse RCP, SWT, and OSGi technologies. Enables developers to run modernization
    assessments and transformations directly from the IDE without context switching.
  annotations:
    github.com/project-slug: CodeConnecter/Backstage-Test
    backstage.io/techdocs-ref: dir:.
    sonarqube.org/project-key: unisys:eclipse-plugin
  tags:
    - eclipse
    - ide
  links:
    - url: https://raw.githubusercontent.com/CodeConnecter/Backstage-Test/main/docs/eclipse-plugin.md
      title: Plugin Documentation
      icon: documentation
    - url: https://www.eclipse.org/
      title: Eclipse IDE
      icon: web

spec:
  type: application
  lifecycle: production
  owner: group:default/team-transformation
  system: unisys

  providesApis: []

  dependsOn:
    - component:default/assessment-service
    - component:default/genai-service
    - component:default/template-config
    - resource:default/auth0-oauth

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: openai-api
  title: OpenAI API
  description: >-
    External OpenAI service integration. Provides GPT-4o model and Assistants API v2
    for AI-powered code analysis and migration recommendations.
  tags:
    - external

  links:
    - url: https://openai.com/api/
      title: OpenAI Platform
      icon: web

spec:
  type: external-service
  owner: group:default/team-transformation
  system: unisys

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: azure-openai-api
  title: Azure OpenAI API
  description: >-
    External Azure OpenAI service integration. Provides GPT-4o model and
    API v2024-05-01-preview for enterprise AI deployments with Azure integration.
  tags:
    - external
    - openai
  links:
    - url: https://azure.microsoft.com/en-us/products/ai-services/openai-service/
      title: Azure OpenAI Service
      icon: web

spec:
  type: external-service
  owner: group:default/team-transformation
  system: unisys

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: auth0-oauth
  title: Auth0 OAuth2/JWT
  description: >-
    External authentication service providing OAuth2 and JWT token management
