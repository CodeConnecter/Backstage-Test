  tags:
    - external
    - security
  links:
    - url: https://auth0.com/
      title: Auth0 Platform
      icon: web

spec:
  type: external-service
  owner: group:default/team-transformation
  system: unisys

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: kubernetes-deployment
  title: Kubernetes Infrastructure
  description: >-
    Kubernetes deployment infrastructure on Azure hosting the backend services.
    Four environments provisioned: development, staging, pre-production, and production.
    Includes Docker containerization, load balancing, and auto-scaling.
  tags:
    - infrastructure
    - devops
  links:
    - url: https://kubernetes.io/
      title: Kubernetes Documentation
      icon: web

spec:
  type: infrastructure
  owner: group:default/team-transformation
  system: unisys

---
