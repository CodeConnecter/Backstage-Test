apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: user-service
  description: Simple Java user service
  links:
    - title: Website
      url: http://backstage.io
    - title: Documentation
      url: https://backstage.io/docs
    - title: Storybook
      url: https://backstage.io/storybook
    - title: Discord Chat
      url: https://discord.com/invite/EBHEGzX
  annotations:
    github.com/project-slug: my-org/user-service
    backstage.io/techdocs-ref: dir:.

spec:
  type: service
  lifecycle: production
  owner: team-backend
  dependsOn:
    - resource:default/artists-db
  dependencyOf:
    - component:default/artist-web-lookup
  providesApis:
    - user-service-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: user-service-api
  description: API for user service

spec:
  type: openapi
  lifecycle: production
  owner: team-backend
  definition:
    $text: ./api/openapi.yaml